<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' https://media.rawg.io https://*.rawg.io data:;" />
<title>Game Library</title>
<link rel="stylesheet" href="./styles.css" />
</head>
<body>

<!-- ── Top bar ─────────────────────────────────────────────── -->
<header id="topbar">
  <button id="back-btn" class="topbar-icon-btn" title="Back" disabled>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
  </button>
  <button id="logo-btn" class="logo-btn">
    <span class="logo-icon">◈</span>
    <span class="logo-text">Game Library</span>
  </button>

  <div id="search-wrap">
    <span class="search-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </span>
    <input type="search" id="search-input" placeholder="Search for games, genres, publishers…"
           autocomplete="off" spellcheck="false" />
    <button id="search-clear" class="search-clear" hidden aria-label="Clear search">✕</button>
  </div>

  <button id="settings-btn" class="topbar-icon-btn" title="Settings">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  </button>
</header>

<!-- ── Body row ─────────────────────────────────────────────── -->
<div id="content-row">

  <!-- Left sidebar -->
  <aside id="sidebar">
    <div class="sidebar-section-hd">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
      </svg>
      Your Library
    </div>
    <div id="sidebar-list">
      <div class="sidebar-empty">Nothing downloaded yet.<br>Find a game and queue it.</div>
    </div>
  </aside>

  <!-- Main content views -->
  <main id="main">
    <div id="view-home"></div>
    <div id="view-browse" hidden></div>
    <div id="view-search" hidden></div>
    <div id="view-game" hidden></div>
    <div id="view-settings" hidden></div>
  </main>

</div>

<!-- ── Fixed bottom download bar ───────────────────────────── -->
<div id="download-bar" hidden>
  <div id="dl-bar-cover" class="dl-bar-cover"></div>
  <div class="dl-bar-body">
    <div class="dl-bar-row1">
      <span id="dl-bar-name" class="dl-bar-name"></span>
      <span id="dl-bar-pct" class="dl-bar-pct"></span>
    </div>
    <div id="dl-bar-meta" class="dl-bar-meta"></div>
    <div class="dl-bar-track">
      <div id="dl-bar-fill" class="dl-bar-fill"></div>
    </div>
  </div>
  <button id="dl-bar-goto" class="dl-bar-goto" title="View in library">↑ Library</button>
</div>

<script src="./js/format.js"></script>
<script src="./js/input/focus-nav.js"></script>
<script src="./js/pages/home.js"></script>
<script src="./js/pages/game.js"></script>
<script src="./js/pages/search-view.js"></script>
<script src="./js/pages/settings.js"></script>
<script src="./js/sidebar.js"></script>
<script src="./js/app.js"></script>
<script src="./js/input/keyboard.js"></script>
<script src="./js/input/gamepad.js"></script>
</body>
</html>
